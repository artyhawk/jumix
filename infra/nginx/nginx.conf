# Jumix reverse proxy (B3-UI-5b).
#
# SSL termination предполагается на хостовом nginx / Traefik / Caddy
# перед этим контейнером. Этот nginx работает только по HTTP:80 внутри
# compose network + exposed на 80 для прямого dev-теста или за reverse
# proxy (cloud LB / certbot sidecar).

worker_processes auto;
events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;

  # logs → stdout для Docker
  access_log /dev/stdout;
  error_log  /dev/stderr warn;

  # Upload limit matches backend LICENSE_MAX_SIZE (10MB) + margin.
  client_max_body_size 12M;

  # Gzip для JSON responses + static assets.
  gzip on;
  gzip_types
    application/json
    application/javascript
    text/css
    text/plain
    text/html
    application/xml;
  gzip_min_length 1024;

  # pmtiles fly в отдельном server для MIME + Range support.
  types {
    application/vnd.pmtiles pmtiles;
  }

  server {
    listen 80;
    server_name _;

    # Security headers baseline. HTTPS-specific (HSTS) — добавить на
    # внешнем reverse proxy вместе с SSL.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---------- pmtiles static (B3-UI-5b) ----------
    # MapLibre делает HTTP Range requests по .pmtiles файлу. nginx по-умолчанию
    # поддерживает Range (if_modified_since off чтобы избежать 304 на partial).
    location /tiles/ {
      alias /var/lib/jumix/tiles/;
      add_header Access-Control-Allow-Origin * always;
      add_header Accept-Ranges bytes always;
      add_header Cache-Control "public, max-age=3600" always;
      if_modified_since off;
      etag on;
      expires 1h;
    }

    # ---------- API ----------
    location /api/ {
      proxy_pass http://api:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    # ---------- Health passthrough (orchestrator probes) ----------
    location = /health {
      proxy_pass http://api:3000/health;
      access_log off;
    }
    location = /health/ready {
      proxy_pass http://api:3000/health/ready;
      access_log off;
    }

    # ---------- Web (Next.js) ----------
    location / {
      proxy_pass http://web:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # Next.js HMR / streaming SSR может использовать Upgrade в некоторых
      # сценариях — безопасно оставить forwarded.
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
